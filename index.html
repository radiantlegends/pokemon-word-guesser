            <aside id="answers-panel">
                <h2>Answers</h2>

                <ol id="answers-list">

                        <button class="reveal-btn">Reveal</button>

                </ol>
            </aside>
        </main>
        
        <footer id="scores-panel">
            <h2>Scores</h2>

            <div id="players">
                <div class="player red">
                    <span class="hint-label"></span>
                    <span class="player-name">Player 1</span>
                    <span class="player-score">0</span>
                </div>

                <div class="player blue">
                    <span class="hint-label"></span>
                    <span class="player-name">Player 2</span>
                    <span class="player-score">0</span>
                </div>

                <div class="player green">
                    <span class="hint-label"></span>
                    <span class="player-name">Player 3</span>
                    <span class="player-score">0</span>
                </div>

                <div class="player yellow">
                    <span class="hint-label"></span>
                    <span class="player-name">Player 4</span>
                    <span class="player-score">0</span>
                </div>
            </div>

            <div id="reset-area">
                <hr>
                <button id="new-round-btn">Start New Round</button>
                <button id="restart-game-btn">Restart Game</button>
            </div>
        </footer>

        <div id="player-select" class="hidden">
            <button data-player="0">P1</button>
            <button data-player="1">P2</button>
            <button data-player="2">P3</button>
            <button data-player="3">P4</button>
        </div>

        <script src="script.js"></script>
    </body>
</html>
