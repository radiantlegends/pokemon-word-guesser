        <link rel="stylesheet" href="css/base.css">

            </div>

                </section>
                <section class="panel" id="answers-panel">
                    <h2>Answers</h2>

                    <ol id="answers-list" class="answer-list">
                        <li>
                            <span class="answer-text"></span>
                            <button class="reveal-btn">Reveal</button>
                            <span class="guesser-tag"></span>
                        </li>

                </section>
            
                <section class="panel score-panel" id="scores-panel">
                    <h2>Scores</h2>

                    <div id="players">
                        <div class="player red">
                            <span class="hint-label"></span>
                            <span class="player-name">Player 1</span>
                            <span class="player-score">0</span>
                        </div>

                        <div class="player blue">
                            <span class="hint-label"></span>
                            <span class="player-name">Player 2</span>
                            <span class="player-score">0</span>
                        </div>

                        <div class="player green">
                            <span class="hint-label"></span>
                            <span class="player-name">Player 3</span>
                            <span class="player-score">0</span>
                        </div>

                        <div class="player yellow">
                            <span class="hint-label"></span>
                            <span class="player-name">Player 4</span>
                            <span class="player-score">0</span>
                        </div>
                    </div>

                    <div id="reset-area">
                        <hr>
                        <button id="new-round-btn" class="primary">Next Round</button>
                        <button id="restart-game-btn" class="secondary">Restart Game</button>
                    </div>
                </section>

            </main>

            <div id="player-select" class="hidden">
                <button data-player="0" class="red">P1</button>
                <button data-player="1" class="blue">P2</button>
                <button data-player="2" class="green">P3</button>
                <button data-player="3" class="yellow">P4</button>
            </div>
        </div>

        <script type="module" src="js/main.js"></script>
